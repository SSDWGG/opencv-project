<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>实时发型试戴</title>
  </head>
  <body>
    <div id="app">
      <section class="hero">
        <div>
          <p class="eyebrow">Realtime Hair Try-On</p>
          <h1>实时摄像头发型替换</h1>
          <p class="subtitle">
            使用人脸关键点检测定位额头、太阳穴和头部姿态，再用真实透明 PNG 发丝素材实时合成目标发型。
          </p>
        </div>
        <button id="startButton" class="primary-button">开启摄像头</button>
      </section>

      <main class="workspace">
        <section class="stage-card">
          <div class="video-shell">
            <video id="camera" playsinline muted></video>
            <canvas id="stage" aria-label="实时发型预览画布"></canvas>
            <div id="emptyState" class="empty-state">
              <strong>准备开始试戴</strong>
              <span>点击“开启摄像头”，正脸看向屏幕即可实时预览。</span>
            </div>
          </div>
          <div id="status" class="status">等待摄像头授权</div>
        </section>

        <aside class="control-card">
          <div class="panel-section">
            <h2>选择发型</h2>
            <div id="styleButtons" class="style-grid"></div>
          </div>

          <label class="field">
            <span>发色微调</span>
            <input id="hairColor" type="color" value="#17110d" />
          </label>

          <label class="field">
            <span>覆盖强度</span>
            <input id="opacity" type="range" min="0.45" max="1" step="0.05" value="0.92" />
          </label>

          <div class="panel-section privacy-section">
            <label class="toggle">
              <input id="privacyToggle" type="checkbox" checked />
              <span>启用拟人动物隐私贴图</span>
            </label>
            <p class="privacy-note">
              开启后会用跟随头部姿态、眨眼和张嘴的小狐脸覆盖真实面部内容。
            </p>
          </div>

          <label class="toggle">
            <input id="debugToggle" type="checkbox" />
            <span>显示人脸定位点</span>
          </label>

          <div class="tips">
            <h2>使用建议</h2>
            <ul>
              <li>光线越均匀，额头和脸部定位越稳定。</li>
              <li>发型会根据头部倾斜角度自动旋转和缩放。</li>
              <li>默认开启隐私贴图，可随时关闭查看原始试戴画面。</li>
              <li>真实 PNG 会保留发丝纹理，发色只做轻微混合。</li>
              <li>当前版本是试戴合成，不会真正擦除原始头发。</li>
            </ul>
          </div>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
